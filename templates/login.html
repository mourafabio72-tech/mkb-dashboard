<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — MKB Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center;
           min-height: 100vh; background: var(--bg); }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo img { height: 38px; margin-bottom: 10px; display: block; margin: 0 auto 8px; }
    .login-logo h1 { font-size: 18px; color: var(--text); margin: 0; font-weight: 700; }
    .login-logo p  { font-size: 12px; color: var(--muted); margin: 4px 0 0; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted);
                        margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .form-group input {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 14px; box-sizing: border-box;
      transition: border-color .15s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .btn-login {
      width: 100%; padding: 11px; background: var(--primary); color: #fff;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .15s; letter-spacing: .3px;
    }
    .btn-login:hover { opacity: .85; }
    .erro-login {
      background: rgba(248,113,113,.1); color: var(--danger);
      border: 1px solid rgba(248,113,113,.3); border-radius: 7px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 18px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='bps4-logo.png') }}" alt="BPS4">
      <h1>MKB Dashboard</h1>
      <p>Grupo Markbuilding · BPS4 Contabilidade</p>
    </div>

    {% if erro %}
      <div class="erro-login">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="usuario" autocomplete="username"
               value="{{ ultimo_usuario or '' }}" autofocus required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Entrar →</button>
    </form>
  </div>
</body>
</html>
